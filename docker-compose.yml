# Infraestructura local — API FastAPI + Panel Next.js (BD en Supabase, no local)
services:
  api:
    build: ./api
    ports:
      - "8000:8000"
    env_file:
      - ./api/.env
    volumes:
      - ./api:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  admin-panel:
    build: ./admin-panel
    ports:
      - "3000:3000"
    env_file:
      - ./admin-panel/.env.local
    volumes:
      - ./admin-panel:/app
      - /app/node_modules
      - /app/.next
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api
