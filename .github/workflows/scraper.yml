name: Daily LEGO Price Scraper

on:
  schedule:
    - cron: '0 2 * * *' # Runs every day at 02:00 AM UTC
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  scrape-and-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper/requirements.txt
          playwright install chromium

      - name: Run Scraper Worker
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }} # Must be set in GitHub repository secrets
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }} # Must be set in GitHub repository secrets
        run: |
          python scraper/main.py
